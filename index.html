<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IVRY - עברי 🎉</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  overflow: hidden;
  position: relative;
}

.snow { position: fixed; top: -10px; color: #fff; font-size: 1.2em; animation: fall linear infinite; opacity: 0.8; z-index: 0; }
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

.card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 40px 50px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: cardIn 0.8s ease-out;
  max-width: 500px;
}
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.8) translateY(30px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.emoji-row {
  font-size: 2.8em;
  margin-bottom: 10px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.name {
  font-size: 4.5em;
  font-weight: 900;
  background: linear-gradient(135deg, #f5af19, #f12711, #f5af19);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradient 3s ease infinite;
  margin: 5px 0;
  letter-spacing: 4px;
}
@keyframes gradient {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.name-he {
  font-size: 3em;
  color: #fff;
  font-weight: 300;
  opacity: 0.9;
  margin-bottom: 10px;
}

.info {
  color: rgba(255,255,255,0.6);
  font-size: 1em;
  margin-bottom: 15px;
  line-height: 1.8;
}
.info .highlight {
  color: #f5af19;
  font-weight: 600;
}

.subtitle {
  font-size: 1.3em;
  color: rgba(255,255,255,0.7);
  margin-top: 5px;
}

.tooth-section {
  margin: 18px 0 5px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
}
.tooth-fairy {
  font-size: 2.2em;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-8px) rotate(5deg); }
  75% { transform: translateY(-4px) rotate(-5deg); }
}
.tooth-msg {
  font-size: 1.05em;
  color: #f5d0fe;
  margin-top: 5px;
  opacity: 0.9;
}
.tooth-count {
  font-size: 0.85em;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
}

.family {
  margin-top: 18px;
  font-size: 1.6em;
  color: rgba(255,255,255,0.8);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

.balls {
  margin-top: 18px;
  font-size: 2.2em;
}
.balls span {
  display: inline-block;
  animation: spin 3s linear infinite;
  margin: 0 5px;
}
.balls span:nth-child(2) { animation-delay: 0.5s; animation-duration: 2.5s; }
.balls span:nth-child(3) { animation-delay: 1s; animation-duration: 2s; }
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.cool-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin: 15px 0;
}
.badge {
  display: inline-block;
  padding: 6px 14px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  color: rgba(255,255,255,0.8);
  font-size: 0.85em;
  animation: badgeIn 0.6s ease-out backwards;
}
.badge:nth-child(1) { animation-delay: 0.3s; }
.badge:nth-child(2) { animation-delay: 0.5s; }
.badge:nth-child(3) { animation-delay: 0.7s; }
@keyframes badgeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.birthday-banner {
  margin-top: 15px;
  padding: 10px 20px;
  background: linear-gradient(135deg, rgba(245,175,25,0.2), rgba(241,39,17,0.2));
  border-radius: 12px;
  border: 1px solid rgba(245,175,25,0.3);
}
.birthday-banner .text {
  color: #f5d0a9;
  font-size: 1.1em;
}
.birthday-banner .age {
  font-size: 2em;
  margin-top: 3px;
}

.mountain {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  z-index: 0;
}
.mountain svg { width: 100%; height: 100%; }
</style>
</head>
<body>

<div class="card">
  <div class="emoji-row">⛷️ ⚽ 🏔️ 😎</div>
  <div class="name">IVRY</div>
  <div class="name-he">עברי</div>
  <div class="info">
    <span class="highlight">טבעון</span> 🏡<br>
    ✈️ חזר מטיול חלום: 20 יום סקי בבולגריה + איטליה!
  </div>
  <div class="subtitle">!You're awesome</div>

  <div class="cool-badges">
    <span class="badge">😎 הכי קול בטבעון</span>
    <span class="badge">🇧🇬🇮🇹 סקי בבולגריה + איטליה</span>
    <span class="badge">👑 אח גדול בנשמה</span>
  </div>

  <div class="tooth-section">
    <div class="tooth-fairy">🧚‍♀️ ✨ 🦷🦷🦷</div>
    <div class="tooth-msg">!פיית השיניים אוהבת אותך</div>
    <div class="tooth-count">3 שיניים כבר נפלו! אלוף!</div>
  </div>

  <div class="birthday-banner">
    <div class="text">בקרוב יום הולדת!</div>
    <div class="age">🎂 6 🎂</div>
  </div>

  <div class="family">👨‍👩‍👧‍👦 ענבל, אמיר, אחות גדולה ואח גדול</div>

  <div class="balls">
    <span>⚽</span>
    <span>🎿</span>
    <span>⚽</span>
  </div>
</div>

<div class="mountain">
  <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
    <path d="M0,120 L200,40 L400,90 L600,20 L800,70 L1000,10 L1200,60 L1440,30 L1440,120 Z" fill="rgba(255,255,255,0.05)"/>
    <path d="M0,120 L300,60 L500,100 L720,40 L900,80 L1100,30 L1440,50 L1440,120 Z" fill="rgba(255,255,255,0.03)"/>
  </svg>
</div>

<script>
const flakes = ['❄', '❅', '❆', '✦', '•'];
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div');
  s.className = 'snow';
  s.textContent = flakes[Math.floor(Math.random() * flakes.length)];
  s.style.left = Math.random() * 100 + 'vw';
  s.style.animationDuration = (3 + Math.random() * 5) + 's';
  s.style.animationDelay = Math.random() * 5 + 's';
  s.style.fontSize = (0.5 + Math.random() * 1.2) + 'em';
  s.style.opacity = 0.3 + Math.random() * 0.5;
  document.body.appendChild(s);
}
</script>
</body>
</html>
